name: Live Smoke

on:
  schedule:
    - cron: "17 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Run live header check
        run: npm run check:headers

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run live smoke test
        run: npm run check:live

      - name: Run external link smoke test
        run: npm run check:external
